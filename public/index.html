<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blow 'em Up Buddies</title>
    <link rel="stylesheet" href="/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <!-- Health vignette overlay -->
    <div id="health-vignette"></div>

    <div id="ui-layer">
        <div id="start-screen" class="screen interactive">
            <div class="menu-card text-center">
                <h1 class="game-title">BUDDIES</h1>

                <div class="input-group">
                    <label>CALLSIGN</label>
                    <input type="text" id="input-name" placeholder="ENTER NAME" maxlength="12">
                </div>

                <button id="btn-host" class="primary-btn mt-20">HOST GAME</button>

                <div class="divider"><span>OR</span></div>

                <div class="input-group">
                    <input type="text" id="input-code" placeholder="ROOM CODE" maxlength="4">
                    <button id="btn-join" class="secondary-btn mt-10">JOIN ROOM</button>
                </div>
            </div>
        </div>

        <div id="host-setup-screen" class="screen interactive hidden">
            <button class="icon-btn back-btn" id="btn-cancel-host"><i class="ph ph-arrow-left"></i></button>
            <button id="btn-confirm-host" class="circle-btn success-btn confirm-setup-btn"><i class="ph ph-check"></i></button>
            <div class="host-controls">
                <div class="selector-card">
                    <button id="btn-map-prev">&lt;</button>
                    <span id="lbl-setup-map">Shattered City</span>
                    <button id="btn-map-next">&gt;</button>
                </div>
                <div class="selector-card">
                    <button id="btn-tank-prev">&lt;</button>
                    <span id="lbl-setup-tanks">6 Tanks</span>
                    <button id="btn-tank-next">&gt;</button>
                </div>
                <div class="selector-card">
                    <button id="btn-mode-prev">&lt;</button>
                    <span id="lbl-setup-mode">Free-For-All</span>
                    <button id="btn-mode-next">&gt;</button>
                </div>
            </div>
        </div>

        <!-- LOBBY: collapsible bottom drawer on mobile -->
        <div id="lobby-screen" class="hub-container interactive hidden">
            <!-- Drawer handle (mobile only) -->
            <div id="lobby-drawer-handle" class="lobby-drawer-handle">
                <div class="drawer-pill"></div>
                <span id="lobby-code-inline" class="room-code-inline">ROOM: ----</span>
                <span id="lobby-seat-inline" class="seat-inline"></span>
                <button id="btn-ready-inline" class="ready-inline-btn">READY UP</button>
            </div>

            <div id="view-roster" class="hub-view">
                <div class="hub-header">
                    <button class="icon-btn" id="btn-leave-hub"><i class="ph ph-arrow-left"></i></button>
                    <span id="lobby-code-display" class="room-code">ROOM: ----</span>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <button class="icon-btn interactive" id="btn-open-settings" title="Settings"><i class="ph ph-gear"></i></button>
                        <button class="text-btn" id="btn-open-garage" style="font-weight:bold; color:var(--neon-green);">CUSTOMIZE <i class="ph ph-arrow-right"></i></button>
                    </div>
                </div>
                <div class="roster-grid" id="roster-grid"></div>

                <div class="action-footer">
                    <button id="btn-enable-ar" class="secondary-btn" style="display: none;">AR AIM</button>
                    <button id="btn-ready" class="primary-btn">READY UP</button>
                    <button id="btn-launch" class="success-btn hidden">LAUNCH MATCH</button>
                </div>
            </div>

            <div id="view-garage" class="hub-view hidden">
                <div class="hub-header">
                    <button class="icon-btn" id="btn-close-garage"><i class="ph ph-arrow-left"></i></button>
                    <h3 class="garage-title">WORKSHOP</h3>
                </div>
                <div class="garage-content">
                    <div class="combined-picker">
                        <label>TURRET & BARREL</label>
                        <div class="picker-controls">
                            <button id="btn-top-prev">&lt;</button>
                            <span id="lbl-top-part">Assault Package</span>
                            <button id="btn-top-next">&gt;</button>
                        </div>
                    </div>
                    <div class="combined-picker">
                        <label>CHASSIS & TREADS</label>
                        <div class="picker-controls">
                            <button id="btn-bottom-prev">&lt;</button>
                            <span id="lbl-bottom-part">Heavy Tracker</span>
                            <button id="btn-bottom-next">&gt;</button>
                        </div>
                    </div>
                    <label class="mt-10">PAINT JOB</label>
                    <div class="color-palette" id="color-palette-bot"></div>
                    <div class="color-palette" id="color-palette-top"></div>
                </div>
            </div>
        </div>

        <button id="btn-switch-seat" class="interactive hidden">SWAP</button>
        <div id="crosshair" class="hidden"></div>
        <div id="joy-base" class="joystick-base hidden"><div id="joy-nub" class="joystick-nub"></div></div>

        <!-- Gameboy A/B buttons (bottom-right) -->
        <div id="btn-cluster" class="hidden">
            <!-- Ring SVG indicator around primary button -->
            <svg id="ring-indicator" class="ring-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="44" class="ring-track"/>
                <circle id="ring-fill" cx="50" cy="50" r="44" class="ring-fill"/>
            </svg>
            <div id="btn-primary" class="action-button btn-a interactive">A</div>
            <div id="btn-secondary" class="action-button btn-b interactive">B</div>
        </div>

        <!-- Legacy IDs kept for backward compat with app.js HUD updates -->
        <div id="btn-boost" class="hidden" style="display:none!important;"></div>
        <div id="btn-jump" class="hidden" style="display:none!important;"></div>
        <div id="btn-ability-swap" class="hidden" style="display:none!important;"></div>

        <canvas id="minimap" width="100" height="100" class="hidden" style="position: absolute; background: rgba(15, 12, 27, 0.6); z-index: 100; opacity: 0.7;"></canvas>

        <!-- Legacy hud-bars kept hidden; HUD is now the ring indicator -->
        <div id="hud-bars" style="display:none!important; position:absolute; pointer-events:none;">
            <div id="bar-label"></div>
            <div><div id="bar-fill"></div></div>
        </div>

        <!-- Damage numbers container -->
        <div id="dmg-numbers" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;"></div>

        <!-- Settings overlay -->
        <div id="settings-overlay" class="screen interactive hidden" style="z-index:500;">
            <div class="menu-card settings-card">
                <div class="settings-header">
                    <h3 class="settings-title">SETTINGS</h3>
                    <button class="icon-btn" id="btn-close-settings"><i class="ph ph-x"></i></button>
                </div>
                <div class="settings-row">
                    <label for="slider-volume">MASTER VOLUME</label>
                    <div class="volume-control">
                        <i class="ph ph-speaker-low volume-icon"></i>
                        <input type="range" id="slider-volume" class="volume-slider" min="0" max="1" step="0.05" value="0.5">
                        <i class="ph ph-speaker-high volume-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/map-builder.js"></script>
    <script src="/environment.js"></script>
    <script src="/maps.js"></script>
    <script src="/tank-factory.js"></script>
    <script src="/lobby.js"></script>
    <script src="/graphics.js"></script>
    <script src="/controls.js"></script>
    <script src="/network.js"></script>
    <script src="/audio.js"></script>
    <script src="/app.js"></script>
</body>
</html>
